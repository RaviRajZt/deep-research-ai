# ============================================
# Deep Research Platform - Docker Compose (Development)
# ============================================
# Usage: docker compose up --build
# This configuration is optimized for local development
# with hot-reloading, debug logging, and exposed ports.
# ============================================

services:
  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    container_name: dr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deep_research}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deep_research_dev}
      POSTGRES_DB: ${POSTGRES_DB:-deep_research}
    ports:
      - "${POSTGRES_PORT:-2222}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-deep_research} -d ${POSTGRES_DB:-deep_research}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dr-network

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: dr-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-deep_research_dev}"
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6666}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-deep_research_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - dr-network

  # ---------- Backend (FastAPI) ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: dr-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - OLLAMA_MODEL=gemma2:2b
      - SEARXNG_BASE_URL=http://searxng:8080
    ports:
      - "${BACKEND_PORT:-8888}:8000"
    command: >
      sh -c "
      echo 'Running database migrations...' &&
      alembic upgrade head &&
      echo 'Starting backend server...' &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    volumes:
      # Mount source code for hot-reload
      - ./backend/app:/app/app:ro
      # Mount alembic (writable) so new migration files persist to host
      # and env.py changes are immediately reflected without a rebuild
      - ./backend/alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
      searxng:
        condition: service_started
    networks:
      - dr-network

  # ---------- Frontend (Next.js) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: dr-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_APP_ENV=development
    ports:
      - "${FRONTEND_PORT:-4000}:3000"
    volumes:
      # Mount source code for hot-reload; exclude node_modules
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
    depends_on:
      - backend
    networks:
      - dr-network

  # ---------- Ollama (Local Gemma 2b Model) ----------
  ollama:
    image: ollama/ollama:latest
    container_name: dr-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - dr-network

  # ---------- Ollama Model Pull Sidecar ----------
  ollama-pull:
    image: curlimages/curl:latest
    container_name: dr-ollama-pull
    restart: "no"
    depends_on:
      - ollama
    entrypoint: >
      sh -c "
      echo 'Waiting for Ollama service to start...';
      until curl -s http://ollama:11434/api/tags > /dev/null; do
        sleep 2;
      done;
      echo 'Ollama is healthy. Initializing automatic pull of gemma2:2b open-source model...';
      curl -s -X POST http://ollama:11434/api/pull -d '{\"name\": \"gemma2:2b\"}';
      echo 'Gemma model successfully loaded and ready for deep research!';
      "
    networks:
      - dr-network

  # ---------- SearXNG (Privacy-Respecting Local Search) ----------
  searxng:
    image: searxng/searxng:latest
    container_name: dr-searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./infrastructure/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
    networks:
      - dr-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local

networks:
  dr-network:
    driver: bridge
    name: dr-network
