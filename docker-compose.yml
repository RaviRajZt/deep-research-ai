# ============================================
# Deep Research Platform - Docker Compose (Development)
# ============================================
# Usage: docker compose up --build
# This configuration is optimized for local development
# with hot-reloading, debug logging, and exposed ports.
# ============================================

services:
  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    container_name: dr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deep_research}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deep_research_dev}
      POSTGRES_DB: ${POSTGRES_DB:-deep_research}
    ports:
      - "${POSTGRES_PORT:-2222}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-deep_research} -d ${POSTGRES_DB:-deep_research}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dr-network

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: dr-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-deep_research_dev}"
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6666}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-deep_research_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - dr-network

  # ---------- Backend (FastAPI) ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: dr-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "${BACKEND_PORT:-8888}:8000"
    volumes:
      # Mount source code for hot-reload
      - ./backend/app:/app/app:ro
      # Mount alembic (writable) so new migration files persist to host
      # and env.py changes are immediately reflected without a rebuild
      - ./backend/alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dr-network

  # ---------- Frontend (Next.js) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: dr-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_APP_ENV=development
    ports:
      - "${FRONTEND_PORT:-4000}:3000"
    volumes:
      # Mount source code for hot-reload; exclude node_modules
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
    depends_on:
      - backend
    networks:
      - dr-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  dr-network:
    driver: bridge
    name: dr-network
