# ============================================
# Deep Research Platform - Alembic Configuration
# ============================================
# Uses async engine for consistency with the application.
# env.py reads database URL directly from application settings
# to avoid duplicating connection config.
# ============================================

[alembic]
script_location = alembic
prepend_sys_path = .

# Disable file-based URL — loaded programmatically via env.py
sqlalchemy.url =

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
