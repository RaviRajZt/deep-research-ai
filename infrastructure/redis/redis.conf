# ============================================
# Redis Configuration - Production
# ============================================
# Applied via volume mount in docker-compose.prod.yml
# Development uses inline command args instead.
# ============================================

# Network
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 60

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence (AOF for durability)
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Logging
loglevel notice

# Security
# requirepass is set via environment variable in docker-compose

# Performance
hz 10
dynamic-hz yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Slow log (queries taking > 10ms)
slowlog-log-slower-than 10000
slowlog-max-len 128
