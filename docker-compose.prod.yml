# ============================================
# Deep Research Platform - Docker Compose (Production)
# ============================================
# Usage: docker compose -f docker-compose.prod.yml up -d
# This configuration is optimized for production with
# Nginx reverse proxy, resource limits, and no source mounts.
# ============================================

services:
  # ---------- Nginx Reverse Proxy ----------
  nginx:
    image: nginx:alpine
    container_name: dr-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - dr-network
    deploy:
      resources:
        limits:
          memory: 128M

  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    container_name: dr-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - dr-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: dr-redis
    restart: always
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dr-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------- Backend ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dr-backend
    restart: always
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dr-network
    deploy:
      resources:
        limits:
          memory: 2G
      replicas: 2

  # ---------- Frontend ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_APP_ENV=production
    container_name: dr-frontend
    restart: always
    networks:
      - dr-network
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  dr-network:
    driver: bridge
    name: dr-network
